<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Ghibli Explorer</title>
    <link rel="icon" href="assets/img/logo.png">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Studio Ghibli Explorer" />
    <meta property="og:description" content="Explore Studio Ghibli films, characters, locations, species, and vehicles in a clean minimalist interface." />
    <meta property="og:image" content="assets/img/logo.png" />
    <meta property="og:url" content="https://your-domain.com/" />
    <meta property="og:site_name" content="Ghibli Explorer" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Studio Ghibli Explorer" />
    <meta name="twitter:description" content="Explore Studio Ghibli films, characters, and more in a beautiful interface." />
    <meta name="twitter:image" content="assets/img/logo.png" />

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-5">
        🎬 Studio Ghibli Explorer
    </h1>

    <div class="container my-4">

        <div class="row g-3 align-items-center">

            <!-- Search -->
            <div class="col-md-4">
                <input type="text"
                    id="searchInput"
                    class="form-control"
                    placeholder="Search movies..." />
            </div>

            <!-- Director Filter -->
            <div class="col-md-3">
                <select id="directorFilter" class="form-select">
                    <option value="">All Directors</option>
                </select>
            </div>

            <!-- Sort -->
            <div class="col-md-3">
                <select id="sortFilter" class="form-select">
                    <option value="">Sort By</option>
                    <option value="year-asc">Year ↑</option>
                    <option value="year-desc">Year ↓</option>
                    <option value="score-desc">Score ↓</option>
                    <option value="score-asc">Score ↑</option>
                    <option value="title-asc">Title A-Z</option>
                    <option value="title-desc">Title Z-A</option>
                </select>
            </div>

        </div>

    </div>

    <hr>

    <div id="movies" class="row g-4"></div>

    <div
        id="pagination"
        class="d-flex justify-content-center my-5">
    </div>

</div>

<script src="assets/js/app.js"></script>

</body>
</html>
